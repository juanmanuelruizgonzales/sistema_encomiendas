{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
<h1>Dashboard</h1>

<span class="text-muted">
Bienvenido, {{ request.user.username }}
</span>
</div>

<div class="row g-4">

<div class="col-md-4">
<div class="card shadow-sm bg-primary text-white">
<div class="card-body">
<h5><i class="bi bi-box"></i> Activas</h5>
<h1>{{ activas }}</h1>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow-sm bg-warning text-dark">
<div class="card-body">
<h5><i class="bi bi-truck"></i> Pendientes</h5>
<h1>{{ pendientes }}</h1>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow-sm bg-danger text-white">
<div class="card-body">
<h5><i class="bi bi-exclamation-triangle"></i> Retrasadas</h5>
<h1>{{ retrasadas }}</h1>
</div>
</div>
</div>

</div>

<div class="card mt-5 shadow-sm">
<div class="card-body">
<h5 class="mb-3">Resumen del Sistema</h5>

<p class="text-muted">
Control y monitoreo de envíos, clientes y rutas en tiempo real.
</p>

</div>
</div>

{% endblock %}
